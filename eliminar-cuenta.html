<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eliminar cuenta | Zamazen Aegis</title>
  <meta name="description" content="Alias oficial en español para la página de eliminación de cuenta de Zamazen Aegis.">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://rydent.github.io/ZamazenAegis-Web/delete-account.html">
  <meta http-equiv="refresh" content="0; url=delete-account.html">
  <meta name="theme-color" content="#050816">
  <link rel="icon" href="favicon.ico" sizes="any">
  <style>
    :root {
      color-scheme: dark;
      --bg: #050816;
      --panel: rgba(9, 16, 32, 0.94);
      --line: rgba(118, 229, 200, 0.35);
      --text: #edf5ff;
      --muted: #9caece;
      --green: #5ef0bd;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 0%, rgba(47, 124, 255, 0.18), transparent 34%),
        radial-gradient(circle at 100% 10%, rgba(27, 207, 146, 0.12), transparent 28%),
        linear-gradient(180deg, #07101f 0%, #040812 55%, #02050c 100%);
    }

    main {
      width: min(620px, 100%);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.7rem, 5vw, 2.4rem);
      line-height: 1.05;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.65;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 12px 18px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: #06111d;
      background: var(--green);
      font-weight: 800;
      text-decoration: none;
    }

    a:focus-visible {
      outline: 2px solid var(--green);
      outline-offset: 4px;
    }
  </style>
  <script>
    window.location.replace("delete-account.html" + window.location.hash);
  </script>
</head>
<body>
  <main>
    <h1>Eliminar cuenta</h1>
    <p>Esta dirección se mantiene por compatibilidad. La página oficial y canónica de eliminación de cuenta es delete-account.html.</p>
    <a href="delete-account.html">Abrir página oficial</a>
  </main>
</body>
</html>
